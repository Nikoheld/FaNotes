map $http_cf_connecting_ip $fanotes_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

server {
    listen 80;
    server_name fanotes.fasrv.ch;

    include /etc/nginx/snippets/fasrv-cloudflare-origin-only.inc;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        auth_request off;
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name fanotes.fasrv.ch;

    ssl_certificate /etc/letsencrypt/live/fanotes.fasrv.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fanotes.fasrv.ch/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/fasrv-cloudflare-origin-only.inc;

    auth_basic off;
    auth_request off;
    client_max_body_size 1m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    location ^~ /_fanotes_release/ {
        internal;
        alias /mnt/truenas/Fabio/FaNotes-Arch-x86_64/;
        sendfile on;
        tcp_nopush on;
    }

    location ^~ /api/v1/backups {
        client_max_body_size 100m;
        client_body_timeout 30s;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $fanotes_client_ip;
        proxy_set_header X-Forwarded-For $fanotes_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:18185;
    }

    location ^~ /api/v1/ai/ {
        client_max_body_size 3m;
        client_body_timeout 30s;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $fanotes_client_ip;
        proxy_set_header X-Forwarded-For $fanotes_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:18185;
    }

    location = /api/v1/analytics/event {
        access_log off;
        client_max_body_size 2k;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $fanotes_client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_pass http://127.0.0.1:18185;
    }

    location = /api/v1/analytics/summary {
        auth_basic "FaNotes Statistics";
        auth_basic_user_file /etc/nginx/certs/server-apps/fabio-downloads.htpasswd;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $fanotes_client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_pass http://127.0.0.1:18185;
    }

    location = /stats {
        return 308 /stats/;
    }

    location ^~ /stats/ {
        auth_basic "FaNotes Statistics";
        auth_basic_user_file /etc/nginx/certs/server-apps/fabio-downloads.htpasswd;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $fanotes_client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_pass http://127.0.0.1:18185;
    }

    location ^~ /notes/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:*; font-src 'self' data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $fanotes_client_ip;
        proxy_set_header X-Forwarded-For $fanotes_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_connect_timeout 5s;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering on;
        proxy_pass http://127.0.0.1:18185;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $fanotes_client_ip;
        proxy_set_header X-Forwarded-For $fanotes_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_connect_timeout 5s;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering on;
        proxy_pass http://127.0.0.1:18185;
    }
}
